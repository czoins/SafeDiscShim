name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    env:
      # Pre-installed vcpkg on windows-latest lives here. The VCPKG_ROOT env var
      # is NOT reliably set by the runner image anymore, so we set it explicitly.
      VCPKG_ROOT: C:\vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify vcpkg is available
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:VCPKG_ROOT\vcpkg.exe")) {
            throw "vcpkg.exe not found at $env:VCPKG_ROOT. " +
                  "Runner image may have changed."
          }
          & "$env:VCPKG_ROOT\vcpkg.exe" version
          Write-Host "VCPKG_ROOT = $env:VCPKG_ROOT"
          cmake --version | Select-Object -First 1

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: |
            build/vcpkg_installed
            C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-x86-static-${{ hashFiles('src/vcpkg.json', 'src/CMakeLists.txt') }}-${{ runner.os }}
          restore-keys: |
            vcpkg-x86-static-${{ hashFiles('src/vcpkg.json', 'src/CMakeLists.txt') }}-
            vcpkg-x86-static-

      - name: Configure (CMake)
        shell: pwsh
        run: |
          cmake -B build -S src `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x86-windows-static `
            -G "Visual Studio 17 2022" `
            -A Win32

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Locate and stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null

          # The VS generator places the DLL at either:
          #   build/Release/drvmgt.dll               (flat layout)
          #   build/SafeDiscShim/Release/drvmgt.dll  (target-named layout)
          # Search both.
          $dll = Get-ChildItem -Path build -Recurse -Filter "drvmgt.dll" -ErrorAction SilentlyContinue |
                 Where-Object { $_.DirectoryName -match '\\Release\\?' -or $_.DirectoryName -match '\\Release$' } |
                 Select-Object -First 1
          if (-not $dll) {
            Write-Host "build/ tree contents:"
            Get-ChildItem -Path build -Recurse -Filter "*.dll" | Format-Table FullName
            throw "drvmgt.dll not found in build output"
          }
          Write-Host "Found DLL: $($dll.FullName)"
          Copy-Item $dll.FullName -Destination artifacts\drvmgt.dll -Force

          if (Test-Path SafeDiscShim.sdb) {
            Copy-Item SafeDiscShim.sdb -Destination artifacts\SafeDiscShim.sdb -Force
          } else {
            throw "SafeDiscShim.sdb not found at repo root"
          }

          Write-Host "Staged artifacts:"
          Get-ChildItem artifacts | Format-Table Name, Length, LastWriteTime

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SafeDiscShim
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
