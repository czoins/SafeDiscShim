name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    env:
      # Pre-installed vcpkg on windows-latest lives at C:\vcpkg.
      # VCPKG_ROOT is NOT reliably set by the runner image, so we set it explicitly.
      # Verified July 2026: VCPKG_INSTALLATION_ROOT=C:\vcpkg per runner readme.
      VCPKG_ROOT: C:\vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify vcpkg and detect Visual Studio
        shell: pwsh
        run: |
          Write-Host "=== Toolchain verification ==="
          Write-Host "VCPKG_ROOT = $env:VCPKG_ROOT"

          # Verify vcpkg
          if (-not (Test-Path "$env:VCPKG_ROOT\vcpkg.exe")) {
            throw "vcpkg.exe not found at $env:VCPKG_ROOT. Runner image may have changed."
          }
          & "$env:VCPKG_ROOT\vcpkg.exe" version
          Write-Host ""

          # Verify CMake
          $cmakeVer = cmake --version | Select-Object -First 1
          Write-Host $cmakeVer
          Write-Host ""

          # Detect installed Visual Studio using vswhere (Microsoft's official tool,
          # pre-installed at this path on all GitHub Windows runners).
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found at $vswhere. Is Visual Studio installed?"
          }

          $vsPath    = & $vswhere -latest -property installationPath
          $vsVersion = & $vswhere -latest -property installationVersion   # e.g. "18.0.0"
          $vsDisplay = & $vswhere -latest -property displayName           # e.g. "Visual Studio Enterprise 2026"

          Write-Host "VS installation path:    $vsPath"
          Write-Host "VS installation version: $vsVersion"
          Write-Host "VS display name:         $vsDisplay"

          # Extract major version number (e.g. "18" from "18.0.0")
          $vsMajor = $vsVersion.Split('.')[0]

          # Extract year from display name (e.g. "2026" from "Visual Studio Enterprise 2026")
          if ($vsDisplay -match '(\d{4})') {
            $vsYear = $matches[1]
          } else {
            # Fallback known mappings if display name parsing fails
            $yearMap = @{ '14'='2015'; '15'='2017'; '16'='2019'; '17'='2022'; '18'='2026'; '19'='2028' }
            if (-not $yearMap.ContainsKey($vsMajor)) {
              throw "Cannot determine year for VS major version $vsMajor. Display name: $vsDisplay"
            }
            $vsYear = $yearMap[$vsMajor]
          }

          $generator = "Visual Studio $vsMajor $vsYear"
          Write-Host "Constructed CMake generator: $generator"

          # Verify CMake supports this generator
          $cmakeHelp = cmake --help
          if (-not ($cmakeHelp -match [regex]::Escape($generator))) {
            throw @"CMake does not support generator '$generator'."@
          }
          Write-Host "CMake supports generator '$generator' ✓"

          # Export generator string to GITHUB_ENV so subsequent steps can use it.
          # This makes the workflow survive future VS upgrades automatically.
          "CMAKE_GENERATOR=$generator" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Cache vcpkg installed packages
        uses: actions/cache@v5
        with:
          path: |
            build/vcpkg_installed
            C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-x86-static-${{ hashFiles('src/vcpkg.json', 'src/CMakeLists.txt') }}-${{ runner.os }}
          restore-keys: |
            vcpkg-x86-static-${{ hashFiles('src/vcpkg.json', 'src/CMakeLists.txt') }}-
            vcpkg-x86-static-

      - name: Configure (CMake)
        shell: pwsh
        run: |
          Write-Host "Using generator: $env:CMAKE_GENERATOR"
          cmake -B build -S src `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x86-windows-static `
            -G "$env:CMAKE_GENERATOR" `
            -A Win32

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Locate and stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null

          # The VS generator places the DLL at either:
          #   build/Release/drvmgt.dll               (flat layout)
          #   build/SafeDiscShim/Release/drvmgt.dll  (target-named layout)
          # Search both.
          $dll = Get-ChildItem -Path build -Recurse -Filter "drvmgt.dll" -ErrorAction SilentlyContinue |
                 Where-Object { $_.DirectoryName -match '\\Release\\?' -or $_.DirectoryName -match '\\Release$' } |
                 Select-Object -First 1
          if (-not $dll) {
            Write-Host "build/ tree .dll contents:"
            Get-ChildItem -Path build -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue | Format-Table FullName
            throw "drvmgt.dll not found in build output"
          }
          Write-Host "Found DLL: $($dll.FullName)"
          Copy-Item $dll.FullName -Destination artifacts\drvmgt.dll -Force

          if (Test-Path SafeDiscShim.sdb) {
            Copy-Item SafeDiscShim.sdb -Destination artifacts\SafeDiscShim.sdb -Force
          } else {
            throw "SafeDiscShim.sdb not found at repo root"
          }

          Write-Host "Staged artifacts:"
          Get-ChildItem artifacts | Format-Table Name, Length, LastWriteTime

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: SafeDiscShim
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
